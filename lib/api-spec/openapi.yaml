openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Bluestar Alliance recruitment platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Job listings
  - name: applications
    description: Job applications
  - name: testimonials
    description: Testimonials
  - name: auth
    description: Authentication
  - name: admin
    description: Admin operations
  - name: stats
    description: Statistics and summaries
  - name: messages
    description: Chat messages
  - name: notifications
    description: Notifications
  - name: addons
    description: Add-on orders

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all job openings
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: location
          in: query
          required: false
          schema:
            type: string
        - name: urgent
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a single job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found

  /applications:
    post:
      operationId: submitApplication
      tags: [applications]
      summary: Submit a job application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          description: Validation error

  /admin/applications:
    get:
      operationId: listApplications
      tags: [admin]
      summary: Admin - List all applications
      parameters:
        - name: role
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
        "401":
          description: Unauthorized

  /admin/applications/{id}/status:
    patch:
      operationId: updateApplicationStatus
      tags: [admin]
      summary: Update application status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationStatusUpdate"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          description: Not found

  /admin/jobs:
    post:
      operationId: createJob
      tags: [admin]
      summary: Admin - Create a new job listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          description: Unauthorized

  /admin/jobs/{id}:
    patch:
      operationId: updateJob
      tags: [admin]
      summary: Admin - Update a job listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    delete:
      operationId: deleteJob
      tags: [admin]
      summary: Admin - Delete a job listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "404":
          description: Not found

  /admin/payment-settings:
    get:
      operationId: getPaymentSettings
      tags: [admin]
      summary: Admin - Get payment settings
      responses:
        "200":
          description: Payment settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettings"
        "404":
          description: Not configured yet
    put:
      operationId: updatePaymentSettings
      tags: [admin]
      summary: Admin - Update payment settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentSettingsInput"
      responses:
        "200":
          description: Updated payment settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSettings"

  /admin/addon-orders:
    get:
      operationId: listAddonOrders
      tags: [admin]
      summary: Admin - List all add-on orders
      responses:
        "200":
          description: List of add-on orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AddonOrder"

  /admin/addon-orders/{id}/status:
    patch:
      operationId: updateAddonOrderStatus
      tags: [admin]
      summary: Admin - Update addon order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
      responses:
        "200":
          description: Updated addon order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddonOrder"

  /addon-orders:
    post:
      operationId: createAddonOrder
      tags: [addons]
      summary: Create an add-on order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddonOrderInput"
      responses:
        "201":
          description: Add-on order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddonOrder"

  /messages/{applicationId}:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages for an application
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
        - name: email
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in an application thread
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for the current user
      parameters:
        - name: email
          in: query
          required: false
          schema:
            type: string
        - name: role
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: List testimonials
      responses:
        "200":
          description: Testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistration"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
        "409":
          description: Email already exists

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLogin"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required: [message]

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get site-wide statistics summary
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/applications-by-role:
    get:
      operationId: getApplicationsByRole
      tags: [stats]
      summary: Get application counts grouped by role (admin)
      responses:
        "200":
          description: Applications by role
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleCount"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Job:
      type: object
      required: [id, title, location, category, experienceLevel, description, isUrgent, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        location:
          type: string
        category:
          type: string
        experienceLevel:
          type: string
        description:
          type: string
        salaryRange:
          type: ["string", "null"]
        isUrgent:
          type: boolean
        createdAt:
          type: string

    JobInput:
      type: object
      required: [title, location, category, experienceLevel, description]
      properties:
        title:
          type: string
          minLength: 2
        location:
          type: string
          minLength: 2
        category:
          type: string
          minLength: 2
        experienceLevel:
          type: string
          minLength: 2
        description:
          type: string
          minLength: 10
        salaryRange:
          type: string
        isUrgent:
          type: boolean

    ApplicationInput:
      type: object
      required: [fullName, email, phone, country, position, yearsOfExperience]
      properties:
        fullName:
          type: string
          minLength: 2
        email:
          type: string
        phone:
          type: string
        country:
          type: string
        position:
          type: string
        yearsOfExperience:
          type: integer
          minimum: 0
        coverLetter:
          type: string
        cvFileName:
          type: ["string", "null"]

    Application:
      type: object
      required: [id, fullName, email, phone, country, position, yearsOfExperience, status, submittedAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        country:
          type: string
        position:
          type: string
        yearsOfExperience:
          type: integer
        coverLetter:
          type: ["string", "null"]
        cvFileName:
          type: ["string", "null"]
        status:
          type: string
        submittedAt:
          type: string

    ApplicationStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Message:
      type: object
      required: [id, applicationId, senderRole, senderName, content, isRead, createdAt]
      properties:
        id:
          type: integer
        applicationId:
          type: integer
        senderRole:
          type: string
        senderName:
          type: string
        content:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [senderRole, senderName, content]
      properties:
        senderRole:
          type: string
        senderName:
          type: string
        content:
          type: string
          minLength: 1
        email:
          type: string

    Notification:
      type: object
      required: [id, recipientEmail, recipientRole, message, type, isRead, createdAt]
      properties:
        id:
          type: integer
        recipientEmail:
          type: string
        recipientRole:
          type: string
        message:
          type: string
        type:
          type: string
        relatedId:
          type: ["integer", "null"]
        isRead:
          type: boolean
        createdAt:
          type: string

    PaymentSettings:
      type: object
      required: [id, bankName, accountName, accountNumber, updatedAt]
      properties:
        id:
          type: integer
        bankName:
          type: string
        accountName:
          type: string
        accountNumber:
          type: string
        routingNumber:
          type: ["string", "null"]
        swiftCode:
          type: ["string", "null"]
        additionalInfo:
          type: ["string", "null"]
        updatedAt:
          type: string

    PaymentSettingsInput:
      type: object
      required: [bankName, accountName, accountNumber]
      properties:
        bankName:
          type: string
          minLength: 2
        accountName:
          type: string
          minLength: 2
        accountNumber:
          type: string
          minLength: 4
        routingNumber:
          type: string
        swiftCode:
          type: string
        additionalInfo:
          type: string

    AddonOrder:
      type: object
      required: [id, applicationId, applicantEmail, applicantName, visaSponsorship, flightTicket, workPermit, totalAmount, paymentMethod, status, createdAt]
      properties:
        id:
          type: integer
        applicationId:
          type: integer
        applicantEmail:
          type: string
        applicantName:
          type: string
        visaSponsorship:
          type: boolean
        flightTicket:
          type: boolean
        workPermit:
          type: boolean
        totalAmount:
          type: integer
        paymentMethod:
          type: string
        status:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    AddonOrderInput:
      type: object
      required: [applicationId, applicantEmail, applicantName, visaSponsorship, flightTicket, workPermit, totalAmount]
      properties:
        applicationId:
          type: integer
        applicantEmail:
          type: string
        applicantName:
          type: string
        visaSponsorship:
          type: boolean
        flightTicket:
          type: boolean
        workPermit:
          type: boolean
        totalAmount:
          type: integer
        paymentMethod:
          type: string
        notes:
          type: string

    Testimonial:
      type: object
      required: [id, name, role, country, quote, avatarUrl]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        country:
          type: string
        quote:
          type: string
        avatarUrl:
          type: string

    UserRegistration:
      type: object
      required: [email, password, fullName]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 6
        fullName:
          type: string

    UserLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, fullName, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
        createdAt:
          type: string

    StatsSummary:
      type: object
      required: [totalApplications, totalJobs, urgentJobs, pendingApplications, approvedApplications]
      properties:
        totalApplications:
          type: integer
        totalJobs:
          type: integer
        urgentJobs:
          type: integer
        pendingApplications:
          type: integer
        approvedApplications:
          type: integer

    RoleCount:
      type: object
      required: [position, count]
      properties:
        position:
          type: string
        count:
          type: integer
